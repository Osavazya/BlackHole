version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-blackhole}

  backend:
    build:
      context: .                  # КОРЕНЬ репо
      dockerfile: backend/Dockerfile
    environment:
      ENV: dev
      ALLOWED_ORIGINS_RAW: ${ALLOWED_ORIGINS:-http://localhost:5173}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-blackhole}
    depends_on: [db]

  frontend:
    build:
      context: .                  # КОРЕНЬ репо
      dockerfile: frontend/Dockerfile
      args:                       # build-args живут здесь
        VITE_API_URL: ${VITE_API_URL:-/api}
    depends_on: [backend]
